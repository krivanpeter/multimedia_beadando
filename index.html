<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <title>Multimédia beadandó</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<style>

</style>

<body>
    <div class="game-wrapper">
        <div class="game-round">
            <button id="menuBtn" class="round-btn">MENU</button>
            <p class="player-display">
                <span>Current player:</span>
                <span id="currentPlayer"></span>
            </p>
            <div class="action-row">
                <button id="resetBtn" class="round-btn">RESET MY TURN</button>

                <span class="ap-display">
                    <span>Action Points:</span>
                    <span id="ap">10</span>
                </span>
                <button id="endTurnBtn" class="round-btn">END MY TURN</button>
            </div>
        </div>
        <div class="gui">
            <div id="p1gui" class="player-resources">
                <img src="assets/imgs/rock.png" alt="Player 1 rocks"><span class="amount" id="rock1">0</span>
                <img src="assets/imgs/iron.png" alt="Player 1 irons"><span class="amount" id="iron1">0</span>
                <img src="assets/imgs/uranium.png" alt="Player 1 uraniums"><span class="amount" id="uranium1">0</span>
            </div>
            <div>
                <p>Remaining Time: <span id="remainingTime"></span> sec</p>
            </div>
            <div id="p2gui" class="player-resources">
                <img src="assets/imgs/rock.png" alt="Player 2 rocks"><span class="amount" id="rock2">0</span>
                <img src="assets/imgs/iron.png" alt="Player 2 irons"><span class="amount" id="iron2">0</span>
                <img src="assets/imgs/uranium.png" alt="Player 2 uraniums"><span class="amount" id="uranium2">0</span>
            </div>
        </div>

        <canvas id="canvas"></canvas>

        <div class="build-wrapper">
            <div id="p1build" class="player-build-menu">
                <div class="build-items">
                    <div class="build-item" data-type="worker" data-player="1">
                        <img src="assets/imgs/blue_worker.png" alt="Build worker">
                        <span class="cost"></span>
                    </div>
                    <div class="build-item" data-type="truck" data-player="1">
                        <img src="assets/imgs/blue_truck.png" alt="Build truck">
                        <span class="cost"></span>
                    </div>
                    <div class="build-item" data-type="tank" data-player="1">
                        <img src="assets/imgs/blue_tank.png" alt="Build Tank">
                        <span class="cost"></span>
                    </div>
                </div>
            </div>

            <div id="p2build" class="player-build-menu">
                <div class="build-items">
                    <div class="build-item" data-type="worker" data-player="2">
                        <img src="assets/imgs/green_worker.png" alt="Build worker">
                        <span class="cost"></span>
                    </div>
                    <div class="build-item" data-type="truck" data-player="2">
                        <img src="assets/imgs/green_truck.png" alt="Build truck">
                        <span class="cost"></span>
                    </div>
                    <div class="build-item" data-type="tank" data-player="2">
                        <img src="assets/imgs/green_tank.png" alt="Build Tank">
                        <span class="cost"></span>
                    </div>
                </div>
            </div>
        </div>

        <div id="createdBy">
            <p>Created by: Péter Kriván</p>
            <p>Neptun Code: F1X8PG</p>
        </div>
    </div>
    <div id="gameOverMenu" class="overlay" style="display: none;">
        <div class="menu-box">
            <h1>GAME OVER</h1>
            <div class="menu-content">
                <h2 id="winnerText"></h2>
                <button id="newGameBtn" class="menu-btn">NEW GAME</button>
            </div>
        </div>
    </div>
    <div id="mainMenu" class="overlay">
        <div class="menu-box">
            <h1 id="menuTitle">MENU</h1>
            <div class="menu-content">
                <button id="startGameBtn" class="menu-btn">NEW GAME</button>
                <button id="resumeBtn" class="menu-btn" style="display: none;">CONTINUE</button>
            </div>
        </div>
    </div>
</body>
<script type="module" src="assets/js/jquery.min.js"></script>
<script type="module" src="assets/js/main.js"></script>

</html>
