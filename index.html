<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <title>F1X8PG</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<style>

</style>

<body>
    <div class="game-wrapper">
        <div class="gui">
            <div id="p1gui" class="player_resources">
                <img src="assets/imgs/rock.png" alt="Player 1 rocks"><span class="amount" id="rock1">0</span>
                <img src="assets/imgs/iron.png" alt="Player 1 irons"><span class="amount" id="iron1">0</span>
                <img src="assets/imgs/uranium.png" alt="Player 1 uraniums"><span class="amount" id="uranium1">0</span>
            </div>
            <div class="game_round">
                <div style="text-align: center;">
                    <p>
                        <span>Current player:</span>
                        <span id="currentPlayer"></span>
                    </p>
                    <p><span>Action Points:</span><span id="ap">10</span>
                    <p>
                        <button id="reset">RESET</button>
                        <button id="endTurn">END MY TURN</button>
                </div>
            </div>
            <div id="p2gui" class="player_resources">
                <img src="assets/imgs/rock.png" alt="Player 2 rocks"><span class="amount" id="rock2">0</span>
                <img src="assets/imgs/iron.png" alt="Player 2 irons"><span class="amount" id="iron2">0</span>
                <img src="assets/imgs/uranium.png" alt="Player 2 uraniums"><span class="amount" id="uranium2">0</span>
            </div>
        </div>
        <canvas id="canvas"></canvas>
    </div>
</body>
<script type="module" src="assets/js/jquery.min.js"></script>
<script type="module" src="assets/js/main.js"></script>

</html>
